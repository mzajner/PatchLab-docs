name: Check external links

on:
  workflow_dispatch:
  schedule:
    - cron: '17 14 * * 1'

permissions:
  contents: read

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Check links
        uses: lycheeverse/lychee-action@v2.9.0
        with:
          args: >-
            --cache
            --max-cache-age 1d
            --no-progress
            --exclude-path node_modules
            --exclude-path dist
            './**/*.md'
            './**/*.mdx'
          fail: true
